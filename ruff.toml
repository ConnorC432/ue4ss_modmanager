exclude = [
    ".bzr",
    ".direnv",
    ".eggs",
    ".git",
    ".git-rewrite",
    ".hg",
    ".ipynb_checkpoints",
    ".mypy_cache",
    ".nox",
    ".pants.d",
    ".pyenv",
    ".pytest_cache",
    ".pytype",
    ".ruff_cache",
    ".svn",
    ".tox",
    ".venv",
    ".vscode",
    "__pypackages__",
    "_build",
    "buck-out",
    "build",
    "dist",
    "node_modules",
    "site-packages",
    "venv",
    "__*.py",
]

line-length = 120
indent-width = 4

target-version = "py313"

[lint]
preview = true

select = ["E", "F", "B", "I", "S", "PL", "D"]
ignore = [
    "D100", "D101", "D102", "D103", "D104", "D105", "D106", "D107", # Missing docstrings
    "D203", "D211", "D212", "D213", # Docstring conflicts
    "W191", "D206", # Tab indentation conflicts
    "S101", # Use of assert
    "PLR2004", # Magic value in comparison
    "PLW0717", # Try clause contains too many statements
    "PLC0415", # import should be at the top-level
    "PLR6301", # Method could be a function/static
    "E402", # Module level import not at top (needed for mocks in tests)
    "S108", # Insecure temporary file
    "E721", "BLE001", "D404", "CPY001", "EM102", "TRY003", "PLR0904", "D205", "TID252", "D200", "S603", "S404", "S602", "TRY301", "C417", "FA100", "EM101", "FURB113", "E741", "UP007", "UP045"
]
extend-select = ["DOC"]

fixable = ["ALL"]
unfixable = []

dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"

[format]
preview = true

quote-style = "double"
docstring-code-format = true

indent-style = "tab"

skip-magic-trailing-comma = false

line-ending = "auto"

[lint.per-file-ignores]
"**/__init__.py" = ["F401"]

[lint.flake8-quotes]
inline-quotes = "double"

[lint.pydocstyle]
convention = "google"

[lint.pycodestyle]
max-doc-length = 500