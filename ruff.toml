exclude = [
    ".bzr",
    ".direnv",
    ".eggs",
    ".git",
    ".git-rewrite",
    ".hg",
    ".ipynb_checkpoints",
    ".mypy_cache",
    ".nox",
    ".pants.d",
    ".pyenv",
    ".pytest_cache",
    ".pytype",
    ".ruff_cache",
    ".svn",
    ".tox",
    ".venv",
    ".vscode",
    "__pypackages__",
    "_build",
    "buck-out",
    "build",
    "dist",
    "node_modules",
    "site-packages",
    "venv",
    "__*.py",
]

line-length = 120
indent-width = 4

target-version = "py313"

[lint]
preview = true

select = ["ALL"]
ignore = [
    "D100", "D101", "D102", "D103", "D104", "D105", "D106", "D107", # Missing docstrings
    "D203", "D211", "D212", "D213", # Docstring conflicts
    "D206", # Tab indentation conflicts
    "S101", # Use of assert
    "COM812", "ISC001", # Format conflicts
    "E402", # Module level import not at top (needed for mocks in tests)
    "ANN", # Too many type annotation issues for this pass
    "ARG", # Unused arguments (often intentional in callbacks)
    "PLC0415", # Local imports used for lazy loading/avoiding circular deps
    "PLR6301", # Methods that don't use self (often better as methods for API)
    "CPY001", # Missing copyright notice
    "FBT", # Flake8-boolean-trap
    "C901", # Complex structure
    "SLF001", # Private member access
    "PLR0912", # Too many branches
]
extend-select = ["DOC"]

fixable = ["ALL"]
unfixable = []

dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"

[format]
preview = true

quote-style = "double"
docstring-code-format = true

indent-style = "space"

skip-magic-trailing-comma = false

line-ending = "auto"

[lint.per-file-ignores]
"**/__init__.py" = ["F401"]

[lint.flake8-quotes]
inline-quotes = "double"

[lint.pydocstyle]
convention = "google"

[lint.pycodestyle]
max-doc-length = 500