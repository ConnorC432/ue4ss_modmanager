name: Build and Release

on:
  push:
    branches:
      - main

jobs:
  check-tag:
    runs-on: ubuntu-latest
    outputs:
      version_tag: ${{ steps.tag.outputs.version_tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: tag
        run: |
          TAG=$(git tag --points-at HEAD | grep '^v' | head -n 1 || true)
          echo "version_tag=$TAG" >> "$GITHUB_OUTPUT"

  lint:
    name: Lint on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
          - os: windows-latest
          - os: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.dev.txt
          pip install ruff

      - name: Lint
        run: |
          ruff check src

      - name: Check formatting
        run: |
          ruff format --check src

  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
          - os: windows-latest
          - os: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.dev.txt
          pip install pyinstaller

      - name: Pytest
        env:
          PYTHONPATH: .
        run: pytest

  build:
    name: Build on ${{ matrix.os }}
    needs: check-tag
    if: ${{ needs.check-tag.outputs.version_tag != '' }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: UE4SS-ModManager-linux
            add_data_sep: ":"
          - os: windows-latest
            asset_name: UE4SS-ModManager-windows.exe
            add_data_sep: ";"
          - os: macos-latest
            asset_name: UE4SS-ModManager-macos
            add_data_sep: ":"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.dev.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        shell: bash
        run: |
          pyinstaller \
            --onefile \
            --windowed \
            --name "${{ matrix.asset_name }}" \
            --add-data "assets${{ matrix.add_data_sep }}assets" \
            --add-data "assets/img/ue.svg${{ matrix.add_data_sep }}assets/img" \
            --add-data "assets/img/ue.ico${{ matrix.add_data_sep }}assets/img" \
            src/main.py

      - name: Package artifact
        shell: bash
        run: |
          cd dist

          if [ "$RUNNER_OS" == "Linux" ]; then
            zip -r "${{ matrix.asset_name }}.zip" "${{ matrix.asset_name }}"

          elif [ "$RUNNER_OS" == "macOS" ]; then
            zip -r "${{ matrix.asset_name }}.zip" "${{ matrix.asset_name }}"

          else
            powershell Compress-Archive "${{ matrix.asset_name }}" "${{ matrix.asset_name }}.zip"
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/*

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Extract changelog entry
        id: changelog
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          
          BODY=$(awk -v tag="$TAG" '
            $0 ~ "^##[[:space:]]*" tag "$" {flag=1; next}
            /^##[[:space:]]/ && flag {exit}
            flag {print}
          ' CHANGELOG.md)
          
          BODY=$(echo "$BODY" | sed ':a; /^\s*$/{$d;N;ba}')
      
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*.zip
          body: ${{ steps.changelog.outputs.body }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}