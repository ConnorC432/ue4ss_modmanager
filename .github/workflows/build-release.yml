name: Build and Release (Windows + Linux)

on:
  push:
#    tags:
#      - "v*"
    branches:
      - main

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: UE4SS-ModManager-linux
            add_data_sep: ":"
          - os: windows-latest
            asset_name: UE4SS-ModManager-windows.exe
            add_data_sep: ";"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        shell: bash
        run: |
          pyinstaller \
            --onefile \
            --windowed \
            --name "${{ matrix.asset_name }}" \
            --add-data "assets${{ matrix.add_data_sep }}assets" \
            src/main.py

      - name: Rename Windows binary correctly
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Rename-Item dist\UE4SS-ModManager-windows.exe.exe UE4SS-ModManager-windows.exe

      - name: Package artifact (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd dist
          zip -r UE4SS-ModManager-linux.zip UE4SS-ModManager-linux

      - name: Package artifact (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd dist
          powershell Compress-Archive UE4SS-ModManager-windows.exe UE4SS-ModManager-windows.zip

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/*

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}