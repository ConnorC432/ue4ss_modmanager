name: Build and Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: UE4SS-ModManager-linux
            add_data_sep: ":"
          - os: windows-latest
            asset_name: UE4SS-ModManager-windows.exe
            add_data_sep: ";"
          - os: macos-latest
            asset_name: UE4SS-ModManager-macos
            add_data_sep: ":"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.dev.txt
          pip install pyinstaller

      - name: Ruff lint
        run: ruff check .

      - name: Pytest
        env:
          PYTHONPATH: .
        run: pytest

      - name: Build with PyInstaller
        shell: bash
        run: |
          pyinstaller \
            --onefile \
            --windowed \
            --name "${{ matrix.asset_name }}" \
            --add-data "assets${{ matrix.add_data_sep }}assets" \
            --add-data "assets/img/ue.svg${{ matrix.add_data_sep }}assets/img" \
            --add-data "assets/img/ue.ico${{ matrix.add_data_sep }}assets/img" \
            src/main.py

      - name: Package artifact
        shell: bash
        run: |
          cd dist

          if [ "$RUNNER_OS" == "Linux" ]; then
            zip -r "${{ matrix.asset_name }}.zip" "${{ matrix.asset_name }}"

          elif [ "$RUNNER_OS" == "macOS" ]; then
            zip -r "${{ matrix.asset_name }}.zip" "${{ matrix.asset_name }}"

          else
            powershell Compress-Archive "${{ matrix.asset_name }}" "${{ matrix.asset_name }}.zip"
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/*

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Extract changelog entry
        id: changelog
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          
          awk -v tag="## " "$TAG" '
            $0 ~ "^## " tag {flag=1; next}
            /^## / && flag {exit}
            flag {print}
          ' CHANGELOG.md > release_body.txt
          
          echo "body<<EOF" >> $GITHUB_OUTPUT
          cat release_body.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*.zip
          body: ${{ steps.changelog.outputs.body }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}